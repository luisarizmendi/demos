# USB camera parameters – static camera.
#
# Driver config for the overhead / static camera.
# Device /dev/cam_static is a udev symlink.
# See config/hardware/99-so-arm101-cameras.rules.example for setup.

/**:
  ros__parameters:
    framerate: 30.0
    io_method: "mmap"
    pixel_format: "mjpeg2rgb"
    av_device_format: "YUV422P"
    image_width: 640
    image_height: 480

    # Let cameras use their own defaults
    brightness: -1
    contrast: -1
    saturation: -1
    sharpness: -1
    gain: -1

    # Enable auto adjustments
    auto_white_balance: true
    autoexposure: true

    # Disable autofocus (prevents hunting, better for datasets)
    autofocus: false
    focus: -1

/static_camera/cam_static:
  ros__parameters:
    video_device: "/dev/cam_static"
    frame_id: "static_camera_link"
    camera_name: "cam_static"
    camera_info_url: "package://pai_bringup/config/cameras/default_640x480.yaml"
